# deny.toml — License + advisory compliance for fastNLTK
# Check with: cargo deny check

[licenses]
# fastNLTK is Apache-2.0. Allow compatible licenses.
allow = [
    "Apache-2.0",
    "MIT",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "BSL-1.0",
]
# Copyleft is implicitly denied by the allow list above
# Allow these specific crates with non-standard licenses
exceptions = [
    { name = "ring", allow = ["ISC", "MIT", "OpenSSL"] },
]

[bans]
# Prevent accidental dependency duplication
multiple-versions = "warn"
# Deny specific crates (add known-bad ones here)
deny = []
# Highlight crates that should only be used once
highlight = "all"

[advisories]
# Check RustSec advisory database
db-urls = ["https://github.com/rustsec/advisory-db"]
db-path = "~/.cargo/advisory-db"
# Treat unmaintained crates as warnings
unmaintained = "all"
# Ignore specific advisories if needed
# quick-xml is a transitive dep (rustling) — we don't parse XML
# bincode 2.x is unmaintained but functional; plan migration to postcard
ignore = [
    "RUSTSEC-2026-0194",  # quick-xml: quadratic attribute check (not our code)
    "RUSTSEC-2026-0195",  # quick-xml: unbounded allocation (not our code)
]
