name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Code formatting ────────────────────────────────
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check

  # ── Clippy linting ─────────────────────────────────
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Standard: deny correctness+suspicious+perf, warn style+complexity
      - run: cargo clippy --all-targets --no-default-features --features parallel -- -D clippy::correctness -D clippy::suspicious -D clippy::perf -W clippy::style -W clippy::complexity
        env:
          PYO3_PYTHON: python

  # ── Doc build ──────────────────────────────────────
  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --document-private-items

  # ── Rust unit tests (fast) ─────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('Cargo.lock') }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install Python dev headers
        run: |
          pyver=$(python -c "import sys; print(f'python{sys.version_info.major}.{sys.version_info.minor}-dev')")
          sudo apt-get update && sudo apt-get install -y "$pyver"
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Run tests
        run: cargo nextest run --no-default-features --features parallel
        env:
          PYO3_PYTHON: python

  # ── Dependency audit (licenses, bans, advisories) ──
  deny:
    runs-on: ubuntu-latest
    env:
      # Container has 1.85.0; avoid downloading stable from rust-toolchain.toml
      RUSTUP_TOOLCHAIN: "1.85.0"
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  # ── Vulnerability audit ────────────────────────────
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/install-action@cargo-audit
      - name: Check for known vulnerabilities
        run: cargo audit --deny warnings

  # ── Python integration tests ──────────────────────
  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - name: Build and install
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin nltk pytest hypothesis
          .venv/bin/maturin develop --release
          .venv/bin/python -m nltk.downloader punkt punkt_tab averaged_perceptron_tagger_eng
      - run: .venv/bin/python -m pytest tests/ -x -q --tb=short -k "not test_coverage"
      - run: .venv/bin/python -m pytest tests/test_invariants.py -x -q

  # ── Benchmarks (informational only) ───────────────
  bench:
    runs-on: ubuntu-latest
    needs: [test, python-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - name: Build and install
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin nltk pytest-benchmark
          .venv/bin/maturin develop --release
          .venv/bin/python -m nltk.downloader punkt punkt_tab averaged_perceptron_tagger_eng
      - run: .venv/bin/python -m pytest tests/ --benchmark-only --benchmark-sort=name -x --tb=short 2>/dev/null || true
