name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.12"
      - name: Install Python dev headers (needed by PyO3 for linking test binary)
        run: |
          pyver=$(python -c "import sys; print(f'python{sys.version_info.major}.{sys.version_info.minor}-dev')")
          sudo apt-get update && sudo apt-get install -y "$pyver"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ steps.setup-python.outputs.python-version }}
      # Build without extension-module: test binaries need libpython symbols
      # Standard: deny correctness+suspicious+perf, warn style+complexity
      # pedantic+nursery are informational (no CI gate)
      - run: cargo clippy --all-targets --no-default-features --features parallel -- -D clippy::correctness -D clippy::suspicious -D clippy::perf -W clippy::style -W clippy::complexity
        env:
          PYO3_PYTHON: python

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --document-private-items

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.12"
      - name: Install Python dev headers (needed by PyO3 for linking test binary)
        run: |
          pyver=$(python -c "import sys; print(f'python{sys.version_info.major}.{sys.version_info.minor}-dev')")
          sudo apt-get update && sudo apt-get install -y "$pyver"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ steps.setup-python.outputs.python-version }}
      # Build without extension-module: test binaries need libpython symbols.
      # extension-module tells PyO3 to skip linking libpython (loaded at runtime by Python),
      # but cargo test produces a standalone binary that must link Python symbols.
      - name: Run tests
        run: cargo test --no-default-features --features parallel
        env:
          PYO3_PYTHON: python

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  hack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-hack
      - run: cargo hack check --feature-powerset --no-dev-deps

  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build release wheel
        run: |
          pip install maturin nltk
          maturin develop --release
      - name: Install dev deps
        run: pip install pytest-benchmark hypothesis
      - name: Run benchmarks
        run: python -m pytest tests/ --benchmark-only --benchmark-sort=name -x --tb=short 2>/dev/null \
              || echo "benchmarks require --benchmark flag on test functions"
