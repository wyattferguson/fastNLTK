name: Release to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build wheels (x86_64 Linux, macOS, Windows) ──────────
  build:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x64

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --locked --compatibility pypi --out dist
          manylinux: auto
          sccache: true

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  # ── Build Linux aarch64 (inside manylinux cross container) ─
  # Uses a cross-compilation container (x86_64 image) — no QEMU/Docker needed.
  build-linux-aarch64:
    name: Build wheel (aarch64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rust-cross/manylinux_2_28-cross:aarch64
      options: --user root
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Add aarch64 target
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --locked --compatibility pypi --out dist --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: wheel-aarch64
          path: dist/*.whl
          if-no-files-found: error

  # ── Build source distribution ────────────────────────────
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheel-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # ── Publish to PyPI ──────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build, build-linux-aarch64, sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Trusted Publishing via OIDC
    environment: publish

    steps:
      - name: Download all wheels + sdist
        uses: actions/download-artifact@v7
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist

      - name: List artifacts
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
