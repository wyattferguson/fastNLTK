name: Release to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build wheels (matrix across OS + arch) ───────────────
  # Uses PyO3/maturin-action which handles cross-compilation
  # for all targets via manylinux docker containers internally.
  # See https://github.com/PyO3/maturin-action
  build:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x64

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --locked --compatibility pypi --out dist
          manylinux: auto
          sccache: true
          # aarch64 Linux cross-compilation needs the manylinux_2_28-cross
          # container which includes aarch64-unknown-linux-gnu-gcc for C deps
          # (zstd-sys, libmimalloc-sys).  The default `auto` container for
          # aarch64 on x64 uses manylinux2014-cross; 2_28 has better tooling.
          container: ${{ matrix.target == 'aarch64' && 'ghcr.io/rust-cross/manylinux_2_28-cross:aarch64' || '' }}
          # The cc crate detects host GCC's supported flags and passes
          # -Werror=date-time to the target cross-compiler, but the older
          # crosstool-ng-built aarch64 GCC in the manylinux container
          # doesn't know -Wdate-time.  Disable default cc flags so it
          # stops injecting -Werror=date-time.
          before-script-linux: |
            export CRATE_CC_NO_DEFAULTS=1

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  # ── Build source distribution ────────────────────────────
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheel-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # ── Publish to PyPI ──────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Trusted Publishing via OIDC
    environment: publish

    steps:
      - name: Download all wheels + sdist
        uses: actions/download-artifact@v7
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist

      - name: List artifacts
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
